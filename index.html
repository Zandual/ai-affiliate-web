<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <base href="/" />
    <title>AI Affiliate</title>

    <link rel="icon" href="data:," />

    <style>
      /* =========================================================
         RN Web / Expo: layout rules the app expects
      ========================================================== */
      html, body {
        height: 100%;
        margin: 0;
      }

      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
        background: transparent !important;
      }

      #root > div { background: transparent !important; }
      #root [style*="background-color"] { background-color: transparent !important; }

      /* =========================================================
         REMOVE EXPO HEADER TITLE ("Home")
         ---------------------------------------------------------
         Targets only the React Native Web header title inside #root.
         Safe because:
         - Scoped to #root (doesn't affect your overlay)
         - Targets h1 with dir="auto" (RN Web pattern)
         ========================================================= */
      #root h1[dir="auto"] {
        display: none !important;
      }

      /* =========================================================
         Animated background layer (safe)
      ========================================================== */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;

        background:
          radial-gradient(1200px 800px at 20% 20%, rgba(120,150,255,0.16), transparent 55%),
          radial-gradient(1000px 700px at 80% 30%, rgba(255,140,200,0.14), transparent 60%),
          radial-gradient(900px 800px at 30% 80%, rgba(120,255,200,0.12), transparent 65%),
          linear-gradient(120deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85));

        background-size: 160% 160%;
        animation: bg-drift 12s ease-in-out infinite;
        filter: saturate(1.1);
      }

      @keyframes bg-drift {
        0%   { background-position: 0% 0%,   100% 0%,  0% 100%, 0% 0%; }
        50%  { background-position: 60% 40%, 30% 20%, 70% 60%, 0% 0%; }
        100% { background-position: 0% 0%,   100% 0%,  0% 100%, 0% 0%; }
      }

      body { overflow-x: hidden; }

      /* =========================================================
         Spark canvas (visual only, no click blocking)
      ========================================================== */
      #spark-canvas {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        opacity: 0.55;
      }

      @media (prefers-reduced-motion: reduce) {
        body::before { animation: none; }
        #spark-hint { display: none; }
      }

      /* =========================================================
         HOME WOW PANEL (scoped version of the CSS demo)
         ---------------------------------------------------------
         Educational note:
         - We do NOT style html/body/main like the demo.
         - Everything is scoped under #home-wow so it cannot break Expo.
      ========================================================== */
      #home-wow {
        /* =========================
           Design tokens (CSS variables)
           =========================
           These are like named settings that your children elements can reuse.
           Changing these updates everything that references them. */
        --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        --really-green: oklch(88.14% 0.203 158.82);
        --green: oklch(78.59% 0.18 159.1);
        --gray: oklch(92% 0 0);
        --speed: 1200ms;           /* ms = milliseconds (1200ms = 1.2 seconds) */

        /* =========================
           Positioning & stacking
           =========================
           position: fixed -> overlay stays in the same spot even when you scroll
           (attached to the viewport, not the page). */
        position: fixed;    /* attaches to viewport instead of page flow */
        left: 50%;          /* px = fixed distance from left edge. Smaller = closer to the edge. Or, % = relative to viewport width */
        top: 12px;          /* px = fixed distance from top edge. Larger = lower down. */
        transform: translateX(-50%);    /* centering shift */
        z-index: 10000; /* ensures overlay appears above Expo content, like z-index decides who sits on top. Larger number = more “on top”. */

        /* =========================
           Size controls
           ========================= */

        /* width: clamp(min, preferred, max)
           - min: smallest it can get (prevents too narrow)
           - preferred: scales with viewport width (vw = % of viewport width)
           - max: cap it so it doesn’t become comically wide */
        width: clamp(260px, 60vw, 360px);

        /* max-width keeps it from overflowing screen edges
           100vw = viewport width
           subtracting 24px gives breathing room */
        max-width: calc(100vw - 24px);   

        /* padding = internal spacing (top/bottom, left/right)
           Larger padding = taller/wider feel inside */
        padding: 6px 10px;              /* inner spacing (smaller = shorter panel) */

        /* =========================
           Look & feel
           ========================= */
        border-radius: 18px;                        /* larger = rounder corners */
        background: rgba(16, 16, 18, 0.55);         /* last value is opacity (0 to 1) */
        backdrop-filter: blur(12px);                /* glassy blur behind it */
        box-shadow: 0 20px 60px rgba(0,0,0,0.22);   /* shadow depth */

        color: var(--gray);
        font-family: var(--font);
        text-align: left;
        
        /* pointer-events controls whether the overlay can be clicked/dragged.
           auto = clickable (needed for slider)
           none = clicks pass THROUGH to cards (but slider becomes unusable) */
        pointer-events: auto; /* Allows slider interaction even with overlay layers */

        /* =========================
           Layout engine (Flexbox)
           =========================
           display:flex -> children arranged in a row by default */
        display: flex;                   /* creates horizontal layout */

        /* align-items (vertical alignment inside the flex row)
           center = align all child items nicely vertically */
        align-items: center;             /* keeps slider from vertically centering too low */

        /* justify-content (horizontal spacing)
           space-between = left content on left, slider on right */
        justify-content: space-between;  /* left text + right slider */
        gap: 10px;                       /* spacing between children (text block and slider block) */

        /* nowrap prevents the slider from dropping under the text */
        flex-wrap: nowrap;               /* prevents stacking */
      }

      /* On small screens: center it so it doesn’t cover content oddly */
      @media (max-width: 520px) {
        #home-wow {
          /* Mobile goal: make everything visible + stack nicely */
          width: min(80vw, 300px);           /* vw = "viewport width" units (percent of screen width) */
          max-width: 88vw;                   /* prevents overshooting */

          /* safe-area-inset-top prevents it from hiding behind the iPhone notch */
          top: calc(env(safe-area-inset-top) + 8px);

          /* Smaller padding = more room for slider */
          padding: 8px 10px;
          gap: 8px;
            
          /* Center horizontally:
             left:50% puts the LEFT edge at the middle.
             translateX(-50%) pulls it back by half its own width. */
          left:50%;
          transform: translateX(-50%);

          /* Stack the title area and slider vertically so the slider can’t get squeezed off-screen */
          flex-direction: column;      /* row -> column */
          align-items: center;         /* children expand full width */
          text-align: center;

          border-radius: 16px;         /* slightly tighter corners */
        }

        #home-wow h1 {
          /* Allow wrapping if needed on narrow devices */
          white-space: nowrap;         /* HOME fits fine; keeps height down */

          /* Smaller font for mobile so it doesn't dominate */
          font-size: 26px;
          line-height: 1;

          /* If you see clipping, give extra breathing room */
          margin-top: 2px;
        }

        #home-wow h2 {
          font-size: 11px; /* compact subtitle */
          letter-spacing: 0.09ch;
        }
        
        /* Let the slider take full width when stacked */
        #home-wow section {
          width: 100%;
          flex: 0 0 auto;    /* allow grow + shrink */
        }

        /* keep labels + slider centered nicely */
        #home-wow .slider-row {
          width: min(260px, 100%);  /* prevents it from stretching too wide */
          margin: 0 auto;    /* centers the slider block inside the panel */
        }

        #home-wow .slider-labels {
          font-size: 12px;
        }

        #home-wow input[type="range"]::webkit-slider-runnable-track {
          height: 0.42rem;
        }
          
        /* make the thumb a bit smaller on phones */
        #home-wow input[type="range"]::-webkit-slider-thumb {
          height: 1.5rem;
          width: 1.0rem;
          margin-top: -10px;
        }
      }
      
      #home-wow * { font-family: inherit; }
      
      /* Left column: HOME + subtitle */
      #home-wow article {
        display: flex;
        flex-direction: column;  /* stack HOME and subtitle vertically */
        gap: 6px;
        flex: 1;                 /* fill remaining horizontal space as width */
        min-width: 0;            /* allows text column to shrink without breaking layout */
      }

      /* Title: shrink a bit so the panel height drops */
      #home-wow h1 {
        margin: 0;
        color: var(--green);
        font-size: clamp(22px, 6vw, 32px); /* scales down on smaller screens */
        font-weight: 900;
        letter-spacing: 0.02ch;
        line-height: 1;                    /* tighter vertical space */
        overflow: visible;                 /* lets glow/scale render without cutting off */
        white-space: nowrap;               /* prevents HOME from wrapping */
      }

      /* Subtitle: keep compact */
      #home-wow h2 {
        margin: 0;
        font-size: 14px;            /* smaller -> more room for product card below */
        text-transform: uppercase;
        letter-spacing: 0.12ch;
        opacity: 0.95;
        line-height: 1.2;
      }

      /* Letter “breath” animation */
      #home-wow [letter-animation="breath"] > span {
        display: inline-block;
        white-space: break-spaces;
        animation: breath var(--speed) ease calc(var(--index) * 100ms) infinite alternate;
      }

      @keyframes breath {
        from { transform: none; text-shadow: none; }
        to {
          transform: scale(1.25) translateY(-5px);
          text-shadow: 0 0 20px var(--really-green);
        }
      }

      /* Right column: slider area (this is what moves it to the RIGHT side) */
      #home-wow section {
        width: 130px;    /* slider column width */
        flex: 0 0 130px; /* don't grow, don't shrink, stay 130px wide  */
      }

      #home-wow section div {
        width: 100%;
      }

      #home-wow input[type="range"] {
        width: 100%;
      }

      #home-wow .slider-row {
        width: 100%;
        display: grid;
        gap: 8px;
      }

      #home-wow .slider-labels {
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08ch;
        opacity: 0.9;
      }

      /* Range input styling */
      #home-wow input[type="range"] {
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
      }

      #home-wow input[type="range"]::-webkit-slider-runnable-track {
        background: var(--green);
        height: 0.5rem;
        border-radius: 12px;
      }

      #home-wow input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        margin-top: -12px;
        background-color: rgba(16,16,18,0.95);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 8px;
        height: 2rem;
        width: 1.25rem;
      }

      /* To get the button to be glow */
      [aria-label="deal-cta"] {
        border: 1px solid #ff6b3d;
        box-shadow: 0 0 6px #ff6b3d;
        transition: box-shadow 0.3s ease;
        border-radius: 8px;
      }

      [aria-label="deal-cta"]:hover {
        box-shadow: 0 0 18px #ff6b3d, 0 0 30px rgba(255,107,61,0.6);
      }

      /* === Glow effect for the "Get Deal" CTA (React Native Web -> data-testid) === */
      @keyframes dealGlow {
        0% { box-shadow: 0 0 6px rgba(255, 80, 80, 0.35), 0 0 0 rgba(255, 80, 80, 0.0); transform: translateY(0); }
        100% { box-shadow: 0 0 18px rgba(255, 80, 80, 0.75), 0 0 38px rgba(255, 80, 80, 0.35); transform: translateY(-1px); }
      }

      /* RN Web commonly renders Pressable/Button as a div/span/button.
         This targets whatever DOM node receives data-testid="deal-cta". */
      [data-testid="deal-cta"] {
        border-radius: 10px !important;
        animation: dealGlow 1.4s ease-in-out infinite alternate !important;
        transition: transform 120ms ease, filter 120ms ease !important;
        will-change: transform, box-shadow;
      }

      /* Nice hover/focus "reward" */
      [data-testid="deal-cta"]:hover {
        filter: brightness(1.05);
      }

      [data-testid="deal-cta"]:active {
        transform: translateY(0px) scale(0.99);
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Spark canvas + hint -->
    <canvas id="spark-canvas" aria-hidden="true"></canvas>

    <!-- HOME WOW PANEL (safe overlay) -->
    <main id="home-wow" aria-label="Home wow panel">
      <article>
        <h1 split-by="letter" letter-animation="breath">HOME</h1>
        <h2>Make the clicks feel alive</h2>
      </article>

      <section>
        <div class="slider-row">
          <div class="slider-labels">
            <span>Party</span>
            <span>Chill</span>
          </div>
          <input id="breathSpeed" min="100" max="2400" type="range" value="1200" />
        </div>
      </section>
    </main>

    <!-- Expo/React Native Web mounts here -->
    <div id="root"></div>

    <!-- Load Expo bundle -->
    <script src="/AppEntry.js" defer></script>

    <!-- Spark animation -->
    <script src="/spark.js" defer></script>

    <script>
      /**
       * HOME WOW JS (adapted from your demo)
       * ------------------------------------------------------------
       * Educational notes:
       * - Removed `export` keywords (those only work in modules/bundlers).
       * - Scoped queries under #home-wow so we don't touch the Expo app.
       * - Uses prefers-reduced-motion guard.
       */
      (function () {
        const panel = document.getElementById("home-wow");
        if (!panel) return;

        const slider = panel.querySelector('#breathSpeed');
        const title = panel.querySelector('[split-by="letter"]');
        if (!slider || !title) return;

        const span = (text, index) => {
          const node = document.createElement("span");
          node.textContent = text;
          node.style.setProperty("--index", index);
          return node;
        };

        const byLetter = (text) => [...text].map(span);

        const motionOK = window.matchMedia("(prefers-reduced-motion: no-preference)").matches;

        if (motionOK) {
          // Split title text into spans once
          const letters = byLetter(title.innerText);
          title.textContent = ""; // clear
          letters.forEach((n) => title.appendChild(n));
        }

        function onInput() {
          panel.style.setProperty("--speed", `${slider.value}ms`);
        }

        slider.addEventListener("input", debounce(onInput, 10));
        onInput();

        function debounce(func, wait) {
          let timeoutId;
          return function () {
            const context = this;
            const args = arguments;
            clearTimeout(timeoutId);
            timeoutId = setTimeout(() => func.apply(context, args), wait);
          };
        }
      })();
    </script>
  </body>
</html>
